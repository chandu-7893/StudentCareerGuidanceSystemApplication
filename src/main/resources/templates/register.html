<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Student Register</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>

<body>

<div class="auth-page">

    <div class="circle circle-one"></div>
    <div class="circle circle-two"></div>

    <div class="auth-card register-card">

        <div class="avatar">
            🚀
        </div>

        <h1>Create Account</h1>
        <p>Start your personalized career journey</p>

        <form th:action="@{/register}" method="post">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div class="input-box">
                <span>👤</span>
                <input type="text"
                       name="username"
                       placeholder="Username"
                       required>
            </div>

            <div class="input-box">
                <span>📧</span>
                <input type="email"
                       name="email"
                       placeholder="Email"
                       required>
            </div>

            <div class="input-box">
                <span>🔒</span>
                <input type="password"
                       name="password"
                       placeholder="Password"
                       required>
            </div>

            <button type="submit">
                Register
            </button>

        </form>

        <h4>Already registered?</h4>

        <a th:href="@{/login}">
            Login Here
        </a>

    </div>

</div>

</body>
</html>
