<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
 <title>Student Career Guidance</title>
 <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="header">
 <h1>Student Career Guidance System</h1>
 <p>For 10th, 12th, Diploma and Degree completed students</p>
</div>

<div class="main">

 <div class="card">
 <h2>Register Student</h2>

 <form th:action="@{/save}" th:object="${student}" method="post">
 <input type="hidden" th:field="*{id}">

 <input type="text" th:field="*{name}" placeholder="Student Name" required>
 <input type="email" th:field="*{email}" placeholder="Email" required>
 <input type="text" th:field="*{phone}" placeholder="Phone Number" required>

 <select th:field="*{qualification}" required>
 <option value="">Select Qualification</option>
 <option value="10th">10th Completed</option>
 <option value="12th">12th Completed</option>
 <option value="Diploma">Diploma Completed</option>
 <option value="Degree">Degree Completed</option>
 </select>

 <input type="number" step="0.01" th:field="*{percentage}" placeholder="Percentage" required>

 <select th:field="*{interest}" required>
 <option value="">Select Interest</option>
 <option value="Engineering">Engineering</option>
 <option value="Medical">Medical</option>
 <option value="Commerce">Commerce</option>
 <option value="IT">IT / Software</option>
 <option value="Government Jobs">Government Jobs</option>
 </select>

 <button type="submit">Get Career Suggestion</button>
 </form>
 </div>

 <div class="card suggestion" th:if="${suggestion}">
 <h2>Career Suggestion</h2>
 <h3 th:text="'Student: ' + ${studentName}"></h3>
 <p th:text="${suggestion}"></p>
 </div>

</div>

<div class="table-card">
 <h2>Registered Students</h2>

 <table>
 <tr>
 <th>ID</th>
 <th>Name</th>
 <th>Email</th>
 <th>Phone</th>
 <th>Qualification</th>
 <th>Percentage</th>
 <th>Interest</th>
 <th>Action</th>
 </tr>

 <tr th:each="s : ${students}">
 <td th:text="${s.id}"></td>
 <td th:text="${s.name}"></td>
 <td th:text="${s.email}"></td>
 <td th:text="${s.phone}"></td>
 <td th:text="${s.qualification}"></td>
 <td th:text="${s.percentage}"></td>
 <td th:text="${s.interest}"></td>
 <td>
 <a class="edit" th:href="@{/edit/{id}(id=${s.id})}">Edit</a>
 <a class="delete" th:href="@{/delete/{id}(id=${s.id})}">Delete</a>
 </td>
 </tr>
 </table>
</div>

</body>
</html>
